# ==========================================================
#  ربات گراول (Gravel Bot) — ورک‌فلوی گیت‌هاب
#  © Mehdi Rezghi — https://t.me/Mehdirezghi
#
#  با هر push به شاخهٔ main:
#   scripts/build_catalog.py را اجرا می‌کند →
#   catalog.json ، نسخهٔ sw.js ، sitemap.xml و robots.txt
#   به‌روز می‌شوند و © و فوتر در آموزش‌های فاقد آن تزریق می‌شود.
#  سپس نتیجه را خودش commit و push می‌کند و GitHub Pages
#  به‌صورت خودکار نسخهٔ جدید سایت را منتشر می‌کند.
# ==========================================================
name: Gravel Bot

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gravel-bot
  cancel-in-progress: false

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    # جلوگیری از حلقهٔ بی‌پایان: commit خودِ ربات دوباره ربات را اجرا نکند
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout (با تاریخچهٔ کامل برای تاریخ افزوده‌شدن آموزش‌ها)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Gravel Bot
        env:
          SITE_URL: https://aiparto369-lang.github.io/gravel
        run: python scripts/build_catalog.py

      - name: Commit & push results
        run: |
          git config user.name  "gravel-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "تغییری برای ثبت نیست."
          else
            git commit -m "🤖 گراول‌بات: به‌روزرسانی catalog، نسخهٔ کش و sitemap"
            git push
          fi
